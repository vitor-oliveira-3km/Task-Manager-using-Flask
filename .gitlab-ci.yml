stages:
  - build
  - unit
  - integration
  - functional
  - sast
  - dependency
  - docker
  - review
  - deploy
  - dast

build:
  stage: build
  image: python:3.11
  script:
    - python --version
    - pip install -r requirements.txt
    - pip list

unit_test:
 stage: unit
 image: python:3.11

 script:
  - pytest tests/unit

integration_test:
 stage: integration
 image: python:3.11

 script:
  - pytest tests/integration

functional_test:
  stage: functional
  image: python:3.11
  script:
    - pytest tests/functional

sast_scan:
  stage: sast
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r .

dependency_check:
  stage: dependency
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh --scan . --format HTML --out reports
  artifacts:
    paths:
      - reports/

docker_build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t taskmanager .

review:
  stage: review
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t review .

deploy_stage:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker compose up -d

zap_scan:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  script:
    - zap-baseline.py -t http://host.docker.internal:5000
